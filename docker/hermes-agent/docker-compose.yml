services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
    volumes:
      - ./data:/opt/data
      - /home/shimeon/investment_os:/workspace/investment_os
    networks:
      - hermes_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  hermes-dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0 --insecure
    ports:
      - "9119:9119"
    volumes:
      - ./data:/opt/data
      - /home/shimeon/investment_os:/workspace/investment_os:ro
    environment:
      - GATEWAY_HEALTH_URL=http://hermes:8642
    networks:
      - hermes_net
    security_opt:
      - no-new-privileges:true
    depends_on:
      - hermes
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  hermes_net:
    driver: bridge
